name: ShadowDesigner
options:
  bundleIdPrefix: com.happyfacestudios
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  HappyShadows:
    path: ..

targets:
  ShadowDesigner:
    type: application
    platform: macOS
    sources:
      - path: ../Sources/ShadowDesigner
    resources:
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.happyfacestudios.ShadowDesigner
        PRODUCT_NAME: ShadowDesigner
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "HappyShadows Designer"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ShadowDesigner.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: HappyShadows
